name: Setup Django
description: Installere python og dependencies, blant annet Django. 
runs:
  using: composite
  steps:
    - name: Sett opp Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Installer dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
